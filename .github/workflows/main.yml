name: Build Mojito Kernel with ReSukiSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Mengatur Lingkungan Kerja (Setup)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf libncurses5-dev libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo5 python-is-python3

    - name: Mengunduh Toolchain Resmi (Proton Clang 13 - 100% Verified Release)
      run: |
        mkdir -p $GITHUB_WORKSPACE/clang
        cd $GITHUB_WORKSPACE/clang
        
        # Mengunduh rilis biner matang Proton Clang dari server GitHub rilis resmi (Sangat Stabil)
        DOM="github.com"
        USER="kdrag0n"
        REPO="proton-clang"
        
        # Mengunduh arsip langsung menggunakan commit SHA utama agar terhindar dari error link mati
        curl -sL "https://${DOM}/${USER}/${REPO}/archive/refs/heads/master.tar.gz" -o clang.tar.gz
        
        # Ekstrak biner kompiler dan rapikan foldernya
        tar -xf clang.tar.gz --strip-components=1
        rm clang.tar.gz

    - name: Mengunduh Source Code Kernel Mojito (by fiqri19102002)
      run: |
        cd $GITHUB_WORKSPACE
        DOM="github.com"
        USER="fiqri19102002"
        REPO="android_kernel_xiaomi_mojito"
        git clone --depth=1 "https://${DOM}/${USER}/${REPO}.git" -b a11/main kernel-source
        
    - name: Menyuntikkan Source Code ReSukiSU (Anti-Trim Method)
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        DOM="github.com"
        USER="ReSukiSU"
        REPO="ReSukiSU"
        git clone --depth=1 "https://${DOM}/${USER}/${REPO}.git" -b main drivers/kernelsu
        
        echo 'source "drivers/kernelsu/kernel/Kconfig"' >> arch/arm64/Kconfig
        echo 'obj-y += kernelsu/kernel/' >> drivers/Makefile

    - name: Konfigurasi Berkas Defconfig Asli Mojito
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        DEFCONFIG_PATH="arch/arm64/configs/mojito_defconfig"
        
        echo "CONFIG_KPROBES=y" >> "$DEFCONFIG_PATH"
        echo "CONFIG_HAVE_KPROBES=y" >> "$DEFCONFIG_PATH"
        echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG_PATH"
        echo "CONFIG_OVERLAY_FS=y" >> "$DEFCONFIG_PATH"

    - name: Proses Kompilasi Kernel (Compiling dengan Proton Clang)
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        
        # Mendaftarkan Proton Clang ke sistem path peladen
        export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
        
        make O=out mojito_defconfig
        make O=out olddefconfig
        
        # Kompilasi murni menggunakan arsitektur cross-compile Proton Clang bawaan
        make -j$(nproc --all) O=out \
          CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Pembungkusan File ZIP (Repacking with AnyKernel3)
      run: |
        cd $GITHUB_WORKSPACE
        DOM="github.com"
        git clone --depth=1 "https://${DOM}/osm0sis/AnyKernel3.git" AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        
        if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel/
        elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel/
        fi
        
        cd AnyKernel
        zip -r9 ../Custom-Kernel-Mojito-ReSukiSU.zip *

    - name: Mengunggah Hasil Build (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Mojito-Custom-Kernel-ZIP
        path: Custom-Kernel-Mojito-ReSukiSU.zip
