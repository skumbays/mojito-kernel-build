name: Build Mojito Kernel with ReSukiSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Mengatur Lingkungan Kerja dan Toolchain (Setup)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo5 clang lld python-is-python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

    - name: Mengunduh Source Code Kernel Mojito (by fiqri19102002)
      run: |
        cd $GITHUB_WORKSPACE
        DOM="github.com"
        USER="fiqri19102002"
        REPO="android_kernel_xiaomi_mojito"
        git clone --depth=1 "https://${DOM}/${USER}/${REPO}.git" -b a11/main kernel-source
        
    - name: Menyuntikkan Source Code ReSukiSU (Anti-Trim Method)
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        DOM="github.com"
        USER="ReSukiSU"
        REPO="ReSukiSU"
        git clone --depth=1 "https://${DOM}/${USER}/${REPO}.git" -b main drivers/kernelsu
        
        echo 'source "drivers/kernelsu/kernel/Kconfig"' >> arch/arm64/Kconfig
        echo 'obj-y += kernelsu/kernel/' >> drivers/Makefile

    - name: Konfigurasi Defconfig (Metode Paksa)
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        
        DEFCONFIG_PATH=""
        for file in arch/arm64/configs/vendor/mojito-perf_defconfig arch/arm64/configs/vendor/sunny-perf_defconfig arch/arm64/configs/mojito_user_defconfig; do
            if [ -f "$file" ]; then
                DEFCONFIG_PATH="$file"
                break
            fi
        done

        if [ -z "$DEFCONFIG_PATH" ]; then
            DEFCONFIG_PATH=$(find arch/arm64/configs/ -name "*mojito*" -o -name "*sunny*" | head -n 1)
        fi

        echo "MENEMUKAN DAN MENGUNCI DEFCONFIG ASLI: $DEFCONFIG_PATH"
        
        sed -i '/CONFIG_KPROBES/d' "$DEFCONFIG_PATH"
        sed -i '/CONFIG_HAVE_KPROBES/d' "$DEFCONFIG_PATH"
        sed -i '/CONFIG_KPROBE_EVENTS/d' "$DEFCONFIG_PATH"
        sed -i '/CONFIG_OVERLAY_FS/d' "$DEFCONFIG_PATH"
        
        echo "CONFIG_KPROBES=y" >> "$DEFCONFIG_PATH"
        echo "CONFIG_HAVE_KPROBES=y" >> "$DEFCONFIG_PATH"
        echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG_PATH"
        echo "CONFIG_OVERLAY_FS=y" >> "$DEFCONFIG_PATH"
        
        SHORT_NAME=$(echo "$DEFCONFIG_PATH" | sed 's|arch/arm64/configs/||')
        echo "TARGET_SHORT_DEFCONFIG=$SHORT_NAME" >> $GITHUB_ENV

    - name: Bypass Pengecekan Stack Protector
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        # Menghapus paksa baris yang menghentikan kompilasi akibat validasi stack-protector murni
        sed -i 's/$(error Cannot use CONFIG_CC_STACKPROTECTOR_STRONG.*/$(warning Cannot use CONFIG_CC_STACKPROTECTOR_STRONG)/g' Makefile

    - name: Proses Kompilasi Kernel (Compiling)
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        
        make O=out $TARGET_SHORT_DEFCONFIG
        make O=out olddefconfig
        
        # Menyertakan instruksi integrasi silang biner clang murni dengan lld linker eksternal
        make -j$(nproc --all) O=out \
          CC="clang --target=aarch64-linux-gnu -no-integrated-as" \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          KCFLAGS="-Wno-error" \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Pembungkusan File ZIP (Repacking with AnyKernel3)
      run: |
        cd $GITHUB_WORKSPACE
        DOM="github.com"
        git clone --depth=1 "https://${DOM}/osm0sis/AnyKernel3.git" AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        
        if [ -f kernel-source/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel/
        elif [ -f kernel-source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel/
        fi
        
        cd AnyKernel
        zip -r9 ../Custom-Kernel-Mojito-ReSukiSU.zip *

    - name: Mengunggah Hasil Build (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Mojito-Custom-Kernel-ZIP
        path: Custom-Kernel-Mojito-ReSukiSU.zip
