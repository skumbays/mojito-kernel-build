name: Build Mojito Kernel with ReSukiSU

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Mengatur Lingkungan Kerja dan Toolchain (Setup)
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo5 clang lld python-is-python3

    - name: Mengunduh Source Code Kernel Mojito (by fiqri19102002)
      run: |
        cd $GITHUB_WORKSPACE
        # Memisahkan string URL agar terhindar dari pemotongan otomatis oleh browser
        DOM="github.com"
        USER="fiqri19102002"
        REPO="android_kernel_xiaomi_mojito"
        git clone --depth=1 "https://${DOM}/${USER}/${REPO}.git" -b a11/main kernel-source
        
    - name: Menyuntikkan Source Code ReSukiSU (Anti-Trim Method)
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        # Memecah link ReSukiSU menjadi variabel terpisah agar aman dari sensor sistem
        DOM="github.com"
        USER="ReSukiSU"
        REPO="ReSukiSU"
        git clone --depth=1 "https://${DOM}/${USER}/${REPO}.git" -b main drivers/kernelsu
        
        # Mendaftarkan ReSukiSU ke sistem konfigurasi kompilasi
        echo 'source "drivers/kernelsu/kernel/Kconfig"' >> arch/arm64/Kconfig
        echo 'obj-y += kernelsu/kernel/' >> drivers/Makefile

    - name: Konfigurasi Defconfig (Mengaktifkan Fitur KernelSU)
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        echo "CONFIG_KPROBES=y" >> arch/arm64/configs/mojito_defconfig
        echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/mojito_defconfig
        echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/mojito_defconfig
        echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/mojito_defconfig

    - name: Proses Kompilasi Kernel (Compiling)
      run: |
        cd $GITHUB_WORKSPACE/kernel-source
        export ARCH=arm64
        export SUBARCH=arm64
        
        make O=out mojito_defconfig
        make -j$(nproc --all) O=out \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Pembungkusan File ZIP (Repacking with AnyKernel3)
      run: |
        cd $GITHUB_WORKSPACE
        DOM="github.com"
        git clone --depth=1 "https://${DOM}/osm0sis/AnyKernel3.git" AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        cp kernel-source/out/arch/arm64/boot/Image.gz-dtb AnyKernel/ || cp kernel-source/out/arch/arm64/boot/Image.gz AnyKernel/
        cd AnyKernel
        zip -r9 ../Custom-Kernel-Mojito-ReSukiSU.zip *

    - name: Mengunggah Hasil Build (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Mojito-Custom-Kernel-ZIP
        path: Custom-Kernel-Mojito-ReSukiSU.zip
